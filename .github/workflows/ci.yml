name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify source package
        run: npm run verify

      - name: Smoke-test the packed package and CLI
        run: node scripts/smoke-packed-package.mjs

  gradle-wrapper:
    name: Validate Gradle wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

  toolchains:
    name: Linux language toolchains
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Core check
        run: npm run core:check

      - name: Pic DSL smoke
        run: npm run pic:dsl:smoke

      - name: Kotlin Pic generation smoke
        run: npm run pic:kotlin:smoke

      - name: Source Pic generation smoke
        run: npm run pic:source:smoke

      - name: Pic override merge smoke
        run: npm run pic:override:smoke

      - name: Language analysis smoke
        run: npm run language:analysis:smoke

      - name: Language analysis API gate smoke
        run: npm run language:analysis-api-gate:smoke

      - name: Language analysis API smoke
        run: npm run language:analysis-api:smoke

      - name: Language project model smoke
        run: npm run language:project-model:smoke

      - name: Language compile smoke
        run: npm run language:compile:smoke
