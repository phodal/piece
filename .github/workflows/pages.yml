name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify source package
        run: npm run verify

      - name: Core check
        run: npm run core:check

      - name: Pic DSL smoke
        run: npm run pic:dsl:smoke

      - name: Kotlin Pic generation smoke
        run: npm run pic:kotlin:smoke

      - name: Source Pic generation smoke
        run: npm run pic:source:smoke

      - name: Pic override merge smoke
        run: npm run pic:override:smoke

      - name: Language analysis smoke
        run: npm run language:analysis:smoke

      - name: Language analysis API gate smoke
        run: npm run language:analysis-api-gate:smoke

      - name: Language analysis API smoke
        run: npm run language:analysis-api:smoke

      - name: Language project model smoke
        run: npm run language:project-model:smoke

      - name: Language compile smoke
        run: npm run language:compile:smoke

      - name: Build Pages site
        run: npm run pages:build

      - name: Upload Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: piece-pages-${{ github.sha }}
          path: site
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download Pages artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: piece-pages-${{ github.sha }}
          path: site

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "deploy: ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
